# Iceoryx RouDi mempool config for the CycloneDDS shared-memory benchmark.
# Sized for ~100 nodes exchanging 64 KiB FixedMsg samples (keep-last-10):
# the 131072-byte pool holds one 64 KiB payload + Iceoryx headers per chunk.
# ~520 MB of /dev/shm total (run with --ipc=host so the host's /dev/shm is used).
[general]
version = 1

[[segment]]

[[segment.mempool]]
size = 1024
count = 4096

[[segment.mempool]]
size = 16384
count = 4096

[[segment.mempool]]
size = 131072
count = 4096
